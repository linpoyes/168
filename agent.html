<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>代理管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Cinzel:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#0d1520,#060b12 50%,#030508 100%);color:#C8DEFF;font-family:'Noto Serif TC',Georgia,serif;padding:20px 16px}
@keyframes gs{0%{background-position:-200% center}100%{background-position:200% center}}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.container{max-width:600px;margin:0 auto}h1{font-family:'Cinzel',serif;font-size:clamp(18px,4vw,28px);font-weight:900;background:linear-gradient(135deg,#1565C0,#42A5F5,#E3F2FD,#42A5F5,#1565C0);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gs 4s linear infinite;letter-spacing:3px;text-align:center;margin-bottom:4px}.sub{font-family:'Cinzel',serif;font-size:10px;color:#42A5F5;letter-spacing:4px;opacity:.5;text-align:center;margin-bottom:20px}
.panel{padding:16px;background:linear-gradient(180deg,rgba(10,20,35,.95),rgba(5,10,20,.98));border-radius:12px;border:1px solid rgba(66,165,245,.25);box-shadow:0 4px 20px rgba(0,0,0,.4);margin-bottom:14px}.stitle{font-size:11px;color:#42A5F5;letter-spacing:3px;text-align:center;font-family:'Cinzel',serif;opacity:.6;margin-bottom:14px}
.row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}.inp{flex:1;min-width:0;padding:10px 12px;background:rgba(0,0,0,.4);border:1.5px solid rgba(66,165,245,.2);border-radius:8px;color:#90CAF9;font-size:13px;font-family:'Noto Serif TC',serif;outline:none}.inp:focus{border-color:rgba(66,165,245,.5)}.inp::placeholder{color:rgba(66,165,245,.2)}
.btn{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Serif TC',serif;transition:all .2s;border:1.5px solid}.btn:active{transform:scale(.97)}.btn-blue{background:linear-gradient(135deg,#1565C0,#42A5F5);border-color:#42A5F5;color:#fff}.btn-sm{padding:3px 8px;font-size:11px;border-radius:5px}
.item{padding:10px;background:rgba(0,0,0,.25);border:1px solid rgba(66,165,245,.1);border-radius:8px;margin-bottom:8px;animation:fadeIn .3s ease}.item-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap}.b3{background:rgba(66,165,245,.12);color:#42A5F5;border:1px solid rgba(66,165,245,.3)}.b7{background:rgba(255,109,0,.12);color:#FF6D00;border:1px solid rgba(255,109,0,.3)}.bexp{background:rgba(255,0,0,.08);color:#FF5252;border:1px solid rgba(255,0,0,.2)}.bact{background:rgba(0,230,118,.08);color:#00E676;border:1px solid rgba(0,230,118,.2)}.b-lock{background:rgba(255,152,0,.08);color:#FFA726;border:1px solid rgba(255,152,0,.25);font-size:9px}.b-free{background:rgba(255,255,255,.02);color:rgba(66,165,245,.3);border:1px solid rgba(66,165,245,.1);font-size:9px}
.name{color:#90CAF9;font-size:12px;font-weight:700}.code{font-family:'JetBrains Mono',monospace;color:#90CAF9;font-size:11px;cursor:pointer;word-break:break-all}.code:hover{color:#fff}.empty{text-align:center;padding:16px;color:rgba(66,165,245,.25);font-size:12px}
.quota{text-align:center;padding:12px;background:rgba(66,165,245,.05);border:1px solid rgba(66,165,245,.15);border-radius:10px;margin-bottom:14px;font-size:13px;color:#42A5F5}
.quota b{font-size:20px;color:#90CAF9;font-family:'JetBrains Mono',monospace}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:rgba(66,165,245,.9);color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:700;transition:transform .3s;z-index:999;pointer-events:none}.toast.show{transform:translateX(-50%) translateY(0)}
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 30%,#0d1520,#060b12 50%,#030508 100%);z-index:9999;display:flex;align-items:center;justify-content:center}.login-overlay.hidden{display:none}
.logout-btn{position:fixed;top:12px;right:12px;z-index:100;padding:6px 14px;background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.3);border-radius:8px;color:#FF5252;font-size:11px;cursor:pointer;font-family:'Noto Serif TC',serif;display:none}
.footer{text-align:center;margin-top:16px;opacity:.2;font-size:12px;color:#42A5F5}
@media(orientation:landscape){body{zoom:.85}}
</style>
</head>
<body>
<div class="login-overlay" id="LO"><div style="width:90%;max-width:380px;text-align:center;animation:fadeIn .8s ease"><div style="font-size:50px;margin-bottom:16px">👤</div><h1>代理管理系統</h1><div class="sub">AGENT PANEL</div><div class="panel"><div style="font-size:12px;color:rgba(66,165,245,.6);text-align:left;margin-bottom:6px">代理帳號</div><input class="inp" id="LU" type="text" placeholder="帳號" style="width:100%;margin-bottom:10px"/><div style="font-size:12px;color:rgba(66,165,245,.6);text-align:left;margin-bottom:6px">密碼</div><input class="inp" id="LP" type="password" placeholder="密碼" style="width:100%;margin-bottom:10px"/><button class="btn btn-blue" id="LB" style="width:100%">🔓 代理登入</button><div id="LE" style="color:#FF5252;font-size:12px;margin-top:8px;min-height:16px"></div></div></div></div>
<button class="logout-btn" id="OB">登出</button>
<div class="toast" id="TT"></div>
<div class="container" id="MN" style="display:none">
  <div style="text-align:center;margin-bottom:16px"><div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px"><div style="width:40px;height:1px;background:linear-gradient(90deg,transparent,#42A5F5)"></div><span style="color:#42A5F5;font-size:16px">👤</span><div style="width:40px;height:1px;background:linear-gradient(90deg,#42A5F5,transparent)"></div></div><h1 id="welcomeTitle">代理管理系統</h1><div class="sub">AGENT PANEL</div></div>
  <div class="quota" id="quotaInfo">載入中...</div>
  <div class="panel"><div class="stitle">─── 生成激活序號 ───</div><div class="row"><button class="btn btn-blue" id="G3" style="flex:1">🔑 3天序號</button><button class="btn btn-blue" id="G7" style="flex:1;background:linear-gradient(135deg,#CC5500,#FF6D00);border-color:#FF6D00">🔑 7天序號</button></div><div id="GR" style="display:none" class="item"><div style="font-size:11px;color:rgba(66,165,245,.5);margin-bottom:4px">生成的序號：</div><div class="code" id="GC" style="font-size:14px;padding:8px;background:rgba(66,165,245,.05);border-radius:6px;margin-bottom:8px"></div><div class="row"><input class="inp" id="GN" placeholder="備註名稱"/><button class="btn btn-blue btn-sm" id="GS">💾</button></div><button class="btn btn-blue btn-sm" id="GY" style="width:100%">📋 複製序號</button></div></div>
  <div class="panel"><div class="stitle">─── 我的序號列表 ───</div><div id="MC"></div></div>
  <div class="footer">♠ ♥ ♦ ♣</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyCC4XErgsFWI30Vk0LKwTYypNsRbI6J3Fc",authDomain:"fortune168-2aff0.firebaseapp.com",projectId:"fortune168-2aff0",storageBucket:"fortune168-2aff0.firebasestorage.app",messagingSenderId:"1063619189537",appId:"1:1063619189537:web:f80c62c0238c86df54fc60"});
var db=firebase.firestore(),codesRef=db.collection('codes'),agentsRef=db.collection('agents');
var agentUser=null,agentLimit=10,curCode=null;
function toast(m){var t=document.getElementById('TT');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}
function cp(t){navigator.clipboard?navigator.clipboard.writeText(t).then(function(){toast('已複製！')}):toast('複製失敗')}
function gc(d){var n=Date.now();var c=btoa(d+'|'+n).replace(/[^A-Za-z0-9]/g,'').toUpperCase();var p=d===3?'F3':'F7';var ps=[];for(var i=0;i<c.length&&ps.length<4;i+=4)ps.push(c.substr(i,4));while(ps.length<4)ps.push(Math.random().toString(36).substr(2,4).toUpperCase());return p+'-'+ps.join('-')}
function sh(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h=h&h}return h.toString()}

function doLogin(){
  var u=document.getElementById('LU').value.trim(),p=document.getElementById('LP').value.trim();
  if(!u||!p){document.getElementById('LE').textContent='請輸入帳號和密碼';return}
  document.getElementById('LE').textContent='驗證中...';
  agentsRef.doc(u).get().then(function(doc){
    if(!doc.exists){document.getElementById('LE').textContent='帳號不存在';return}
    var d=doc.data();
    if(d.password!==sh(p)){document.getElementById('LE').textContent='密碼錯誤';return}
    if(!d.active){document.getElementById('LE').textContent='此帳號已停用';return}
    agentUser=u;agentLimit=d.limit||10;
    localStorage.setItem('agent_s',JSON.stringify({u:u,t:Date.now()}));
    showMain(d);
  }).catch(function(){document.getElementById('LE').textContent='連線錯誤'});
}

function showMain(agentData){
  document.getElementById('LO').classList.add('hidden');document.getElementById('MN').style.display='block';document.getElementById('OB').style.display='block';
  document.getElementById('welcomeTitle').textContent=(agentData?agentData.name:agentUser)+' 的管理面板';
  startListen();
}

function startListen(){
  // Listen own codes
  codesRef.where('createdBy','==',agentUser).orderBy('created','desc').onSnapshot(function(snap){
    var used=snap.size;
    document.getElementById('quotaInfo').innerHTML='序號額度：<b>'+used+'</b> / <b>'+agentLimit+'</b> 組';
    var c=document.getElementById('MC');while(c.firstChild)c.removeChild(c.firstChild);
    if(snap.empty){c.innerHTML='<div class="empty">尚無序號</div>';return}
    var now=Date.now();
    snap.forEach(function(doc){
      var d=doc.data(),isE=now>d.expiry,rem=d.expiry-now,hrs=Math.max(0,Math.floor(rem/3600000)),dd=Math.floor(hrs/24),hh=hrs%24,ts=isE?'已過期':'剩餘 '+dd+'天'+hh+'時';
      var it=document.createElement('div');it.className='item';var tp=document.createElement('div');tp.className='item-top';
      var db_=document.createElement('span');db_.className='badge '+(d.days===3?'b3':'b7');db_.textContent=d.days+'天';tp.appendChild(db_);
      var ns=document.createElement('span');ns.className='name';ns.textContent=d.name||'未命名';tp.appendChild(ns);
      var eb=document.createElement('button');eb.className='btn btn-sm';eb.style.cssText='background:none;border:1px solid rgba(66,165,245,.2);color:#42A5F5;padding:2px 8px;font-size:11px';eb.textContent='✏️';eb.addEventListener('click',function(){var n=prompt('名稱：',d.name||'');if(n!==null)codesRef.doc(d.code).update({name:n.trim()}).then(function(){toast('已更新')})});tp.appendChild(eb);
      var dlb=document.createElement('button');dlb.className='btn btn-sm';dlb.style.cssText='background:none;border:1px solid rgba(255,82,82,.2);color:#FF5252;padding:2px 8px;font-size:11px';dlb.textContent='🗑';dlb.addEventListener('click',function(){if(confirm('刪除？'))codesRef.doc(d.code).delete().then(function(){toast('已刪除')})});tp.appendChild(dlb);
      var sp=document.createElement('span');sp.style.flex='1';tp.appendChild(sp);var sb=document.createElement('span');sb.className='badge '+(isE?'bexp':'bact');sb.textContent=ts;tp.appendChild(sb);it.appendChild(tp);
      var bt=document.createElement('div');bt.style.cssText='display:flex;align-items:center;gap:6px';var cs=document.createElement('span');cs.className='code';cs.textContent=d.code;cs.style.flex='1';cs.addEventListener('click',function(){cp(d.code)});bt.appendChild(cs);var dv=document.createElement('span');dv.className='badge '+(d.usedBy?'b-lock':'b-free');dv.textContent=d.usedBy?'🔒 已綁定':'🔓 未使用';bt.appendChild(dv);it.appendChild(bt);c.appendChild(it)});
  });
  // Listen agent data changes (limit update etc)
  agentsRef.doc(agentUser).onSnapshot(function(doc){
    if(!doc.exists){toast('帳號已被刪除');localStorage.removeItem('agent_s');location.reload();return}
    var d=doc.data();agentLimit=d.limit||10;
  });
}

function genCode(d){
  // Check quota first
  codesRef.where('createdBy','==',agentUser).get().then(function(snap){
    if(snap.size>=agentLimit){toast('已達序號上限（'+agentLimit+' 組）');return}
    var code=gc(d),now=new Date(),exp=new Date(now.getTime()+d*86400000);curCode=code;
    document.getElementById('GC').textContent=code;document.getElementById('GN').value='';document.getElementById('GR').style.display='block';
    codesRef.doc(code).set({code:code,days:d,name:'',created:now.getTime(),expiry:exp.getTime(),usedBy:null,createdBy:agentUser}).then(function(){toast('序號生成成功！')});
  });
}

// Auto-login
function chk(){var s=localStorage.getItem('agent_s');if(!s)return null;try{var d=JSON.parse(s);if(Date.now()-d.t>86400000){localStorage.removeItem('agent_s');return null}return d.u}catch(e){return null}}
var saved=chk();
if(saved){agentUser=saved;agentsRef.doc(saved).get().then(function(doc){if(doc.exists){agentLimit=doc.data().limit||10;showMain(doc.data())}else{localStorage.removeItem('agent_s')}})}

document.getElementById('LB').addEventListener('click',doLogin);document.getElementById('OB').addEventListener('click',function(){localStorage.removeItem('agent_s');location.reload()});
document.getElementById('LU').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('LP').focus()});document.getElementById('LP').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
document.getElementById('G3').addEventListener('click',function(){genCode(3)});document.getElementById('G7').addEventListener('click',function(){genCode(7)});
document.getElementById('GS').addEventListener('click',function(){var n=document.getElementById('GN').value.trim();if(!n||!curCode)return;codesRef.doc(curCode).update({name:n}).then(function(){toast('已儲存')})});
document.getElementById('GY').addEventListener('click',function(){var c=document.getElementById('GC').textContent;if(c)cp(c)});document.getElementById('GC').addEventListener('click',function(){if(this.textContent)cp(this.textContent)});
</script>
</body>
</html>
