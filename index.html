<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>致富預測系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#050402;overflow-x:hidden}
::-webkit-scrollbar{height:6px}::-webkit-scrollbar-track{background:rgba(212,175,55,0.05)}::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.25);border-radius:3px}
@keyframes gs{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes pg{0%,100%{box-shadow:0 0 20px rgba(212,175,55,0.3)}50%{box-shadow:0 0 30px rgba(212,175,55,0.5)}}
@keyframes fu{from{opacity:0;transform:translateY(20px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes sp{0%,100%{opacity:0.15}50%{opacity:0.7}}
@keyframes tp{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes rf{0%{box-shadow:0 0 0 rgba(212,175,55,0)}30%{box-shadow:0 0 25px rgba(212,175,55,0.5)}100%{box-shadow:0 0 0 rgba(212,175,55,0)}}
@keyframes loginFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.gb{transition:all .2s ease !important}.gb:hover{transform:scale(1.04)!important;filter:brightness(1.15)!important}.gb:active{transform:scale(0.98)!important}
@media(orientation:landscape){.bac-root{zoom:0.8}}
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 30%,#2A1810,#150D05 40%,#050402 100%);z-index:9999;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',Georgia,serif;color:#F5E6C8}
.login-overlay.hidden{display:none}
.login-box{width:90%;max-width:400px;text-align:center;animation:fu .8s ease}
.login-icon{font-size:60px;margin-bottom:16px;animation:loginFloat 3s ease-in-out infinite}
.login-title{font-family:'Cinzel Decorative','Noto Serif TC',serif;font-size:clamp(24px,6vw,36px);font-weight:900;background:linear-gradient(135deg,#B8860B,#FFD700,#FFF8DC,#FFD700,#B8860B);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gs 4s linear infinite;letter-spacing:3px;margin-bottom:6px}
.login-sub{font-family:'Cinzel',serif;font-size:11px;color:#D4AF37;letter-spacing:4px;opacity:.5;margin-bottom:30px}
.login-panel{position:relative;padding:24px;background:linear-gradient(180deg,rgba(30,18,5,.95),rgba(20,12,3,.98));border-radius:14px;border:1px solid rgba(212,175,55,.3);box-shadow:0 8px 40px rgba(0,0,0,.5)}
.login-panel::before,.login-panel::after{content:'';position:absolute;width:24px;height:24px;border-color:#D4AF37;border-style:solid;opacity:.5}
.login-panel::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.login-panel::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.login-input{width:100%;padding:14px 16px;background:rgba(0,0,0,.4);border:1.5px solid rgba(212,175,55,.2);border-radius:10px;color:#FFD740;font-size:16px;font-family:'JetBrains Mono',monospace;letter-spacing:2px;text-align:center;outline:none;transition:all .3s}
.login-input::placeholder{color:rgba(212,175,55,.2);font-size:13px;letter-spacing:1px}
.login-input:focus{border-color:rgba(212,175,55,.5);box-shadow:0 0 15px rgba(212,175,55,.15)}
.login-input.shake{animation:shake .4s ease}
.login-btn{width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,#B8860B,#D4AF37,#FFD700,#D4AF37,#B8860B);background-size:300% auto;border:2px solid #D4AF37;border-radius:10px;color:#1A0F05;font-size:16px;font-weight:900;font-family:'Noto Serif TC',serif;cursor:pointer;animation:gs 3s linear infinite;letter-spacing:3px;box-shadow:0 4px 20px rgba(212,175,55,.3)}
.login-btn:hover{transform:scale(1.03)}.login-btn:active{transform:scale(.98)}
.login-error{color:#FF5252;font-size:12px;margin-top:10px;min-height:18px}
.login-remaining{margin-top:16px;padding:10px;background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.15);border-radius:8px;font-size:12px;color:#00E676;display:none}
.login-remaining.show{display:block}
.logout-btn{position:fixed;top:12px;right:12px;z-index:100;padding:6px 14px;background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.3);border-radius:8px;color:#FF5252;font-size:11px;cursor:pointer;font-family:'Noto Serif TC',serif;display:none}
.logout-btn:hover{background:rgba(255,82,82,.2)}
</style>
</head>
<body>
<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div style="position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;background:repeating-linear-gradient(45deg,transparent,transparent 80px,rgba(212,175,55,0.01) 80px,rgba(212,175,55,0.01) 81px),repeating-linear-gradient(-45deg,transparent,transparent 80px,rgba(212,175,55,0.01) 80px,rgba(212,175,55,0.01) 81px)"></div>
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-title">致富預測系統</div>
    <div class="login-sub">FORTUNE PREDICTION SYSTEM</div>
    <div class="login-panel">
      <div style="font-size:12px;color:rgba(212,175,55,.6);text-align:left;margin-bottom:8px">請輸入激活序號</div>
      <input class="login-input" id="codeInput" type="text" placeholder="F7-XXXX-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false"/>
      <button class="login-btn" id="loginBtn">🔓 激活登入</button>
      <div class="login-error" id="loginError"></div>
      <div class="login-remaining" id="loginRemaining"></div>
    </div>
    <div style="margin-top:24px;font-size:10px;color:rgba(212,175,55,.2)">♠ ♥ ♦ ♣</div>
  </div>
</div>
<button class="logout-btn" id="logoutBtn">登出</button>
<div id="expiryBar" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99;padding:6px 16px;background:linear-gradient(180deg,rgba(20,12,3,0.95),rgba(15,9,2,0.9));border-bottom:1px solid rgba(212,175,55,0.2);display:none;justify-content:space-between;align-items:center;font-family:'Noto Serif TC',serif;backdrop-filter:blur(10px)"></div>
<div id="root" style="padding-top:32px"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script>
// Login system
// Device ID - unique per browser
function getDeviceId(){var id=localStorage.getItem('fortune_device_id');if(!id){id='DEV-'+Date.now()+'-'+Math.random().toString(36).substr(2,8);localStorage.setItem('fortune_device_id',id)}return id}

function checkSession(){var s=localStorage.getItem('fortune_session');if(!s)return false;try{var d=JSON.parse(s);if(Date.now()>d.expiry){localStorage.removeItem('fortune_session');return false}return d}catch(e){return false}}
function validateCode(code){code=code.trim().toUpperCase();if(!code.match(/^F[37]-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/))return{valid:false,error:'序號格式錯誤'};var vc=JSON.parse(localStorage.getItem('valid_codes')||'{}');var d=vc[code];if(!d)return{valid:false,error:'無效的激活序號'};if(Date.now()>d.expiry)return{valid:false,error:'此序號已過期'};var myDevice=getDeviceId();if(d.usedBy&&d.usedBy!==myDevice)return{valid:false,error:'此序號已被其他裝置使用'};return{valid:true,data:d}}
function handleLogin(){var input=document.getElementById('codeInput'),err=document.getElementById('loginError'),code=input.value.trim().toUpperCase();if(!code){err.textContent='請輸入激活序號';input.classList.add('shake');setTimeout(function(){input.classList.remove('shake')},500);return}var r=validateCode(code);if(!r.valid){err.textContent=r.error;input.classList.add('shake');setTimeout(function(){input.classList.remove('shake')},500);return}
// Lock code to this device
var vc=JSON.parse(localStorage.getItem('valid_codes')||'{}');if(vc[code]&&!vc[code].usedBy){vc[code].usedBy=getDeviceId();localStorage.setItem('valid_codes',JSON.stringify(vc))}
localStorage.setItem('fortune_session',JSON.stringify({code:code,expiry:r.data.expiry,days:r.data.days,loginTime:Date.now()}));err.textContent='';showApp()}
function handleLogout(){localStorage.removeItem('fortune_session');document.getElementById('loginOverlay').classList.remove('hidden');document.getElementById('logoutBtn').style.display='none';document.getElementById('expiryBar').style.display='none';document.getElementById('codeInput').value='';document.getElementById('loginError').textContent='';document.getElementById('loginRemaining').classList.remove('show')}
function showApp(){var s=checkSession();if(!s)return;document.getElementById('loginOverlay').classList.add('hidden');document.getElementById('logoutBtn').style.display='block';
// Show remaining time on login page
var rem=s.expiry-Date.now(),hrs=Math.floor(rem/3600000),d=Math.floor(hrs/24),h=hrs%24;var el=document.getElementById('loginRemaining');el.textContent='✓ 已激活 | 剩餘時間：'+d+'天'+h+'小時';el.classList.add('show');
// Show expiry bar in app
var expiryDate=new Date(s.expiry);var expiryBar=document.getElementById('expiryBar');expiryBar.style.display='flex';
function updateExpiry(){var now=Date.now();if(now>s.expiry){handleLogout();return}var r=s.expiry-now;var dd=Math.floor(r/86400000);var hh=Math.floor((r%86400000)/3600000);var mm=Math.floor((r%3600000)/60000);var ss=Math.floor((r%60000)/1000);expiryBar.innerHTML='<span style="color:#D4AF37;font-size:10px;opacity:0.6">到期：'+expiryDate.toLocaleDateString('zh-TW')+' '+expiryDate.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})+'</span><span style="color:#00E676;font-size:11px;font-weight:700;font-family:JetBrains Mono,monospace">剩餘 '+dd+'天'+hh+'時'+mm+'分'+ss+'秒</span>'}
updateExpiry();setInterval(updateExpiry,1000);
if(!window._appInit){window._appInit=true;initApp()}}
document.getElementById('loginBtn').addEventListener('click',handleLogin);
document.getElementById('logoutBtn').addEventListener('click',handleLogout);
document.getElementById('codeInput').addEventListener('input',function(e){var v=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');if(v.length>2){var p=v.substring(0,2),r=v.substring(2),parts=[p];for(var i=0;i<r.length;i+=4)parts.push(r.substr(i,4));v=parts.join('-')}e.target.value=v});
document.getElementById('codeInput').addEventListener('keydown',function(e){if(e.key==='Enter')handleLogin()});
if(checkSession())showApp();
</script>

<script type="text/babel">
function initApp(){
const{useState,useCallback,useRef,useEffect}=React;
const RESULTS = {
  B: { label: "莊", labelEn: "BANKER", color: "#FF1744", bg: "radial-gradient(circle, rgba(255,23,68,0.25) 0%, rgba(255,23,68,0.08) 100%)", border: "#FF1744", glow: "rgba(255,23,68,0.5)" },
  P: { label: "閒", labelEn: "PLAYER", color: "#448AFF", bg: "radial-gradient(circle, rgba(68,138,255,0.25) 0%, rgba(68,138,255,0.08) 100%)", border: "#448AFF", glow: "rgba(68,138,255,0.5)" },
  T: { label: "和", labelEn: "TIE", color: "#00E676", bg: "radial-gradient(circle, rgba(0,230,118,0.25) 0%, rgba(0,230,118,0.08) 100%)", border: "#00E676", glow: "rgba(0,230,118,0.5)" },
};
const SIDE_BETS = { BP: { label: "莊對", color: "#FF1744", icon: "◆" }, PP: { label: "閒對", color: "#448AFF", icon: "◆" }, L6: { label: "幸運6", color: "#FFD740", icon: "★" } };
const TRENDS = [{ label: "大衝", icon: "⚡", color: "#FF6D00" },{ label: "小衝", icon: "〜", color: "#FFAB40" },{ label: "平穩", icon: "━", color: "#69F0AE" },{ label: "順", icon: "➤", color: "#40C4FF" }];

function buildBeadRoad(h){const g=[];let c=-1,r=0;h.forEach((e,i)=>{if(i%6===0){c++;r=0}else r++;if(!g[c])g[c]=[];g[c][r]=e});return g}
function buildBigRoad(h){const g=[];let c=-1,r=-1,l=null;h.forEach(e=>{const m=e.result;if(m==="T"){if(c>=0&&r>=0){if(!g[c][r].ties)g[c][r].ties=0;g[c][r].ties++}return}if(m!==l){c++;r=0;l=m}else r++;if(!g[c])g[c]=[];g[c][r]={...e}});return g}
function getBRC(h){const c=[];let l=null,n=0;h.forEach(e=>{if(e.result==="T")return;if(e.result!==l){if(l!==null)c.push(n);l=e.result;n=1}else n++});if(n>0)c.push(n);return c}
function buildDR(h,o){const bc=getBRC(h),res=[];for(let c=0;c<bc.length;c++)for(let r=0;r<bc[c];r++){if(c<o||(c===o&&r===0))continue;const cc=c-o;let isR;if(r===0)isR=(bc[c-1]||0)===(bc[cc]||0);else isR=r<=(bc[cc]||0)-1;res.push(isR?"red":"blue")}const g=[];let col=-1,row=-1,lc=null;res.forEach(color=>{if(color!==lc){col++;row=0;lc=color}else row++;if(!g[col])g[col]=[];g[col][row]=color});return g}

function RoadGrid({grid,rows=6,cellSize=36,renderCell}){
  const ref=useRef(null);
  const [cols,setCols]=useState(12);
  useEffect(()=>{
    const measure=()=>{if(ref.current){const w=ref.current.clientWidth-6;setCols(Math.max(grid.length,Math.floor(w/(cellSize+1))))}};
    measure();
    const ro=new ResizeObserver(measure);if(ref.current)ro.observe(ref.current);return()=>ro.disconnect();
  },[grid.length,cellSize]);
  useEffect(()=>{if(ref.current)ref.current.scrollLeft=ref.current.scrollWidth},[grid]);
  const mx=Math.max(grid.length,cols);
  return(<div ref={ref} style={{overflowX:"auto",overflowY:"hidden",width:"100%",border:"1px solid rgba(212,175,55,0.25)",borderRadius:10,background:"linear-gradient(180deg,rgba(15,8,2,0.9),rgba(25,12,4,0.95))",boxShadow:"inset 0 1px 3px rgba(0,0,0,0.5)"}}>
    <div style={{display:"grid",gridTemplateColumns:`repeat(${mx},1fr)`,gridTemplateRows:`repeat(${rows},${cellSize}px)`,gap:1,padding:3,minWidth:mx*(cellSize+1)}}>
      {Array.from({length:rows}).map((_,r)=>Array.from({length:mx}).map((_,c)=>{const cell=grid[c]?.[r];return <div key={`${c}-${r}`} style={{minHeight:cellSize,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(212,175,55,0.02)",borderRadius:3,border:"1px solid rgba(212,175,55,0.04)"}}>{cell&&renderCell(cell,cellSize)}</div>}))}
    </div></div>)
}
function BeadCell({entry,size}){const r=RESULTS[entry.result],s=size*0.7;return <div style={{position:"relative"}}><div style={{width:s,height:s,borderRadius:"50%",background:r.bg,border:`2px solid ${r.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:s*0.45,fontWeight:700,color:r.color,boxShadow:`0 0 8px ${r.glow}`}}>{r.label}</div>{entry.sideBets?.length>0&&<div style={{position:"absolute",top:-3,right:-5,display:"flex",gap:1}}>{entry.sideBets.map(sb=><span key={sb} style={{fontSize:9,color:SIDE_BETS[sb].color}}>{SIDE_BETS[sb].icon}</span>)}</div>}</div>}
function BigRoadCell({entry,size}){const r=RESULTS[entry.result],s=size*0.65;return <div style={{position:"relative"}}><div style={{width:s,height:s,borderRadius:"50%",border:`2.5px solid ${r.color}`,boxShadow:`0 0 6px ${r.glow}`}}/>{entry.ties>0&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:9,fontWeight:800,color:RESULTS.T.color}}>{entry.ties}</div>}</div>}
function DCC({color,size,filled=true}){const s=size*0.5,c=color==="red"?"#FF1744":"#448AFF";return <div style={{width:s,height:s,borderRadius:"50%",background:filled?c:"transparent",border:filled?"none":`2px solid ${c}`,boxShadow:`0 0 5px ${c}44`}}/>}
function CRC({color,size}){const s=size*0.55,c=color==="red"?"#FF1744":"#448AFF";return <div style={{width:s,height:s,position:"relative"}}><div style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",background:`linear-gradient(135deg,transparent 45%,${c} 45%,${c} 55%,transparent 55%)`}}/></div>}

function predictNext(history){let bP=0.4586,pP=0.4462;if(history.length>=3){const l=history.slice(-3).map(h=>h.result).filter(r=>r!=="T");if(l.length>=3&&l.every(r=>r==="B")){bP+=0.05;pP-=0.03}if(l.length>=3&&l.every(r=>r==="P")){pP+=0.05;bP-=0.03}}const t=bP+pP,result=Math.random()*t<bP?"B":"P";const sb=[];if(Math.random()<0.0747)sb.push("BP");if(Math.random()<0.0747)sb.push("PP");if(result==="B"&&Math.random()<0.0689)sb.push("L6");const cv=50+Math.random()*35,confidence=cv.toFixed(1);let trend;if(cv>=76)trend=TRENDS[0];else if(cv>=67)trend=TRENDS[1];else if(cv>=59)trend=TRENDS[2];else trend=TRENDS[3];let bW,pW;if(result==="B"){bW=60+Math.random()*25;pW=60+Math.random()*(bW-61)}else{pW=60+Math.random()*25;bW=60+Math.random()*(pW-61)}return{result,sideBets:sb,confidence,trend,independents:{tieWin:(1+Math.random()*8.52).toFixed(1),bpWin:(1+Math.random()*6.47).toFixed(1),ppWin:(1+Math.random()*6.47).toFixed(1),l6Win:(1+Math.random()*4.39).toFixed(1)}}}

function GC({position}){const t=position.includes("top"),l=position.includes("left");return <div style={{position:"absolute",[t?"top":"bottom"]:-1,[l?"left":"right"]:-1,width:24,height:24,borderTop:t?"2px solid #D4AF37":"none",borderBottom:!t?"2px solid #D4AF37":"none",borderLeft:l?"2px solid #D4AF37":"none",borderRight:!l?"2px solid #D4AF37":"none",opacity:0.6}}/>}
function Panel({children,style={}}){return <div style={{position:"relative",padding:16,background:"linear-gradient(180deg,rgba(30,18,5,0.95),rgba(20,12,3,0.98))",borderRadius:12,border:"1px solid rgba(212,175,55,0.3)",boxShadow:"0 4px 20px rgba(0,0,0,0.4),inset 0 1px 0 rgba(212,175,55,0.1)",...style}}><GC position="top-left"/><GC position="top-right"/><GC position="bottom-left"/><GC position="bottom-right"/>{children}</div>}
function RL({label,en}){return <div style={{fontSize:11,color:"#D4AF37",letterSpacing:2,marginBottom:8,display:"flex",alignItems:"center",gap:8,fontFamily:"'Cinzel',serif",opacity:0.7}}><span style={{width:8,height:8,borderRadius:"50%",background:"radial-gradient(circle,#FFD700,#B8860B)",boxShadow:"0 0 6px rgba(212,175,55,0.5)"}}/>{label} {en}</div>}

function App(){
  const[history,setHistory]=useState([]);const[pred,setPred]=useState(null);const[anim,setAnim]=useState(false);const[show,setShow]=useState(false);const[selSB,setSelSB]=useState([]);const[spin,setSpin]=useState(null);const[flash,setFlash]=useState(false);const sRef=useRef(null);
  const add=useCallback((r,sb=[])=>setHistory(p=>[...p,{result:r,sideBets:sb,id:Date.now()+Math.random()}]),[]);
  const doPredict=useCallback(()=>{setAnim(true);setShow(false);setPred(null);const lb=["B","P","B","P","B","P","B","P","B","P"];let i=0;setSpin(lb[0]);sRef.current=setInterval(()=>{i++;if(i<lb.length)setSpin(lb[i])},100);setTimeout(()=>{clearInterval(sRef.current);const p=predictNext(history);setSpin(p.result);setTimeout(()=>{setSpin(null);setPred(p);setAnim(false);setFlash(true);setTimeout(()=>setShow(true),80);setTimeout(()=>setFlash(false),1200)},300)},1200)},[history]);
  const clear=useCallback(()=>{setHistory([]);setPred(null);setShow(false)},[]);const undo=useCallback(()=>{setHistory(p=>p.slice(0,-1));setPred(null);setShow(false)},[]);
  const bead=buildBeadRoad(history),big=buildBigRoad(history),eye=buildDR(history,1),small=buildDR(history,2),cock=buildDR(history,3);
  const st={B:history.filter(h=>h.result==="B").length,P:history.filter(h=>h.result==="P").length,T:history.filter(h=>h.result==="T").length,BP:history.filter(h=>h.sideBets?.includes("BP")).length,PP:history.filter(h=>h.sideBets?.includes("PP")).length,L6:history.filter(h=>h.sideBets?.includes("L6")).length};

  return(
    <div className="bac-root" style={{minHeight:"100vh",background:"radial-gradient(ellipse at 50% 0%,#2A1810 0%,#150D05 40%,#0A0604 100%)",color:"#F5E6C8",fontFamily:"'Noto Serif TC','Noto Sans TC',Georgia,serif",padding:16,boxSizing:"border-box"}}>

        {anim&&spin&&<div style={{padding:30,background:"linear-gradient(180deg,rgba(40,25,8,0.95),rgba(20,12,3,0.98))",borderRadius:14,border:"2px solid rgba(212,175,55,0.5)",marginBottom:16,textAlign:"center",boxShadow:"0 0 40px rgba(212,175,55,0.2)",position:"relative"}}><GC position="top-left"/><GC position="top-right"/><GC position="bottom-left"/><GC position="bottom-right"/><div style={{fontSize:11,color:"#D4AF37",letterSpacing:4,marginBottom:16,fontFamily:"'Cinzel',serif",opacity:0.7}}>─── 預測中 ───</div><div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:100,height:100,borderRadius:"50%",background:RESULTS[spin].bg,border:`3px solid ${RESULTS[spin].color}`,boxShadow:`0 0 40px ${RESULTS[spin].glow}88`,transition:"all 0.08s",animation:"pg 0.6s infinite"}}><span style={{fontSize:48,fontWeight:900,color:RESULTS[spin].color,textShadow:`0 0 25px ${RESULTS[spin].glow}`,fontFamily:"'Noto Serif TC',serif"}}>{RESULTS[spin].label}</span></div><div style={{display:"flex",justifyContent:"center",gap:12,marginTop:16}}>{["B","P"].map(k=><div key={k} style={{width:36,height:36,borderRadius:"50%",background:spin===k?RESULTS[k].bg:"rgba(255,255,255,0.03)",border:`2px solid ${spin===k?RESULTS[k].color:"rgba(255,255,255,0.08)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:spin===k?RESULTS[k].color:"rgba(255,255,255,0.15)",transition:"all 0.08s",transform:spin===k?"scale(1.15)":"scale(1)"}}>{RESULTS[k].label}</div>)}</div></div>}
